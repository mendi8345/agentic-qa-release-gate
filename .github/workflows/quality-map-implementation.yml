name: Quality Map Approved Implementation

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  request-implementation:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse implementation PR and request Codex
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.QUALITY_MAP_USER_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const commandComment = context.payload.comment;
            const issueNumber = issue?.number;
            const command = (commandComment?.body ?? '').trim();
            const author = (commandComment?.user?.login ?? '').toLowerCase();
            const isPullRequestComment = Boolean(issue?.pull_request);
            const approveCommand = '/quality-map approve';
            const retryCommand = '/quality-map retry-implementation';
            const isRetry = command === retryCommand;

            core.info(`Issue #${issueNumber}`);
            core.info(`Comment author: ${author}`);
            core.info(`Normalized command: ${JSON.stringify(command)}`);
            core.info(`Issue state: ${issue?.state}`);
            core.info(`Is pull request comment: ${isPullRequestComment}`);
            core.info(`Is implementation retry: ${isRetry}`);

            if (command !== approveCommand && command !== retryCommand) {
              core.info('Ignoring comment because it is not a Quality Map implementation command.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const postIssueComment = async (body) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
            };

            const formatError = (error) => {
              const status = error?.status ? `HTTP ${error.status}: ` : '';
              return `${status}${error?.message ?? String(error)}`;
            };

            if (isPullRequestComment) {
              core.info('Implementation command rejected because it belongs to a pull request.');
              return;
            }

            if (author !== 'mendi8345') {
              core.info('Implementation command rejected because it was not written by the allowed user.');
              return;
            }

            if (issue?.state !== 'open') {
              await postIssueComment([
                '## Quality Map — Implementation not started',
                '',
                'The implementation command was received, but this issue is not open.',
                'Reopen the issue and try again only if implementation is still required.'
              ].join('\n'));
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              }
            );

            const requiredHeadings = [
              '## Quality Map — Task Understanding',
              '## Relevant Flow and Evidence',
              '## Risks and Possible Impact',
              '## Required Test Coverage',
              '## Facts, Assumptions, and Unknowns',
              '## Confidence and Map Freshness',
              '## Recommendation'
            ];

            const analysesBeforeCommand = comments
              .filter((comment) => comment.id < commandComment.id)
              .filter((comment) => comment.user?.login === 'chatgpt-codex-connector[bot]')
              .filter((comment) => requiredHeadings.every((heading) =>
                (comment.body ?? '').includes(heading)))
              .sort((left, right) => right.id - left.id);

            const analysis = analysesBeforeCommand[0];

            if (!analysis) {
              await postIssueComment([
                '## Quality Map — Implementation not started',
                '',
                'No complete Codex Quality Map analysis was found before this command.',
                'Run `/quality-map analyze`, review the result, and approve again.'
              ].join('\n'));
              return;
            }

            const extractSection = (text, startHeading, endHeading) => {
              const start = text.indexOf(startHeading);
              if (start < 0) return '';

              const contentStart = start + startHeading.length;
              const end = endHeading
                ? text.indexOf(endHeading, contentStart)
                : -1;

              return text.slice(contentStart, end >= 0 ? end : undefined).trim();
            };

            const analysisBody = analysis.body ?? '';
            const recommendationSection = extractSection(
              analysisBody,
              '## Recommendation',
              null
            ).toUpperCase();

            if (!recommendationSection.includes('READY FOR IMPLEMENTATION PLAN')) {
              await postIssueComment([
                '## Quality Map — Implementation not started',
                '',
                `The latest analysis does not authorize implementation: ${analysis.html_url}`,
                '',
                'Its recommendation must be `READY FOR IMPLEMENTATION PLAN` before implementation can start.'
              ].join('\n'));
              return;
            }

            const freshnessSection = extractSection(
              analysisBody,
              '## Confidence and Map Freshness',
              '## Recommendation'
            );

            const freshnessMatch = freshnessSection.match(
              /^Map freshness:\s*(FRESH FOR THIS TASK|FRESH|POTENTIALLY STALE|MAP REFRESH REQUIRED|UNVERIFIED)\s*$/mi
            );
            const freshness = freshnessMatch?.[1]?.toUpperCase() ?? 'UNVERIFIED';

            const coverageMatch = freshnessSection.match(
              /^Map coverage:\s*(COMPLETE|MAP COVERAGE GAP)\s*$/mi
            );
            const mapCoverage = coverageMatch?.[1]?.toUpperCase() ?? 'UNVERIFIED';

            core.info(`Parsed map freshness: ${freshness}`);
            core.info(`Parsed map coverage: ${mapCoverage}`);

            const allowedFreshness = new Set([
              'FRESH',
              'FRESH FOR THIS TASK'
            ]);

            if (!allowedFreshness.has(freshness)) {
              await postIssueComment([
                '## Quality Map — Implementation not started',
                '',
                `The latest approved analysis has map status **${freshness}**: ${analysis.html_url}`,
                '',
                'A machine-readable `Map freshness:` line with `FRESH` or `FRESH FOR THIS TASK` is required before implementation can start.',
                'Re-run `/quality-map analyze` after correcting or refreshing the relevant evidence.'
              ].join('\n'));
              return;
            }

            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;
            const baseRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${defaultBranch}`
            });
            const baseCommit = baseRef.data.object.sha;
            const branchName = `quality-map/issue-${issueNumber}-analysis-${analysis.id}`;
            const handoffPath = `.quality-map/requests/issue-${issueNumber}-analysis-${analysis.id}.json`;

            const matchingPulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'all',
                head: `${owner}:${branchName}`,
                per_page: 100
              }
            );

            let pullRequest = matchingPulls
              .sort((left, right) => right.number - left.number)[0];

            if (pullRequest?.merged_at) {
              await postIssueComment([
                '## Quality Map — Implementation already delivered',
                '',
                `The implementation pull request for this analysis was already merged: ${pullRequest.html_url}`
              ].join('\n'));
              return;
            }

            if (pullRequest && pullRequest.state === 'closed') {
              try {
                const reopened = await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pullRequest.number,
                  state: 'open'
                });
                pullRequest = reopened.data;
              } catch (error) {
                await postIssueComment([
                  '## Quality Map — Existing implementation PR is closed',
                  '',
                  `The workflow found ${pullRequest.html_url}, but could not reopen it.`,
                  '',
                  `Error: \`${formatError(error)}\``
                ].join('\n'));
                return;
              }
            }

            let createdNow = false;

            if (!pullRequest) {
              try {
                try {
                  await github.rest.git.getRef({
                    owner,
                    repo,
                    ref: `heads/${branchName}`
                  });
                  core.info(`Reusing existing branch ${branchName}.`);
                } catch (error) {
                  if (error.status !== 404) throw error;

                  await github.rest.git.createRef({
                    owner,
                    repo,
                    ref: `refs/heads/${branchName}`,
                    sha: baseCommit
                  });
                  core.info(`Created branch ${branchName} at ${baseCommit}.`);
                }

                const handoff = {
                  schemaVersion: 1,
                  issueNumber,
                  issueUrl: issue.html_url,
                  issueTitle: issue.title,
                  analysisCommentId: analysis.id,
                  analysisUrl: analysis.html_url,
                  approvalCommentId: commandComment.id,
                  approvalUrl: commandComment.html_url,
                  mapStatus: freshness,
                  mapCoverage,
                  baseBranch: defaultBranch,
                  baseCommit,
                  implementationBranch: branchName,
                  requestedBy: commandComment.user?.login,
                  requestedAt: new Date().toISOString()
                };

                let existingHandoffSha;
                try {
                  const existingHandoff = await github.rest.repos.getContent({
                    owner,
                    repo,
                    path: handoffPath,
                    ref: branchName
                  });

                  if (!Array.isArray(existingHandoff.data)) {
                    existingHandoffSha = existingHandoff.data.sha;
                  }
                } catch (error) {
                  if (error.status !== 404) throw error;
                }

                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: handoffPath,
                  message: `Start approved implementation for issue #${issueNumber}`,
                  content: Buffer.from(`${JSON.stringify(handoff, null, 2)}\n`).toString('base64'),
                  branch: branchName,
                  ...(existingHandoffSha ? { sha: existingHandoffSha } : {})
                });

                const prBody = [
                  '## Quality Map implementation handoff',
                  '',
                  `Closes #${issueNumber}`,
                  '',
                  `- **Approved analysis:** ${analysis.html_url}`,
                  `- **Human approval:** ${commandComment.html_url}`,
                  `- **Map status:** ${freshness}`,
                  `- **Map coverage:** ${mapCoverage}`,
                  `- **Implementation branch:** \`${branchName}\``,
                  '',
                  'This draft pull request was created before implementation so Codex has a real GitHub branch and PR context.',
                  'The bootstrap handoff file must be removed before implementation is complete.',
                  '',
                  `<!-- quality-map-draft-pr analysis-comment-id:${analysis.id} issue-number:${issueNumber} -->`
                ].join('\n');

                const createdPullRequest = await github.rest.pulls.create({
                  owner,
                  repo,
                  title: `[Quality Map] ${issue.title}`,
                  head: branchName,
                  base: defaultBranch,
                  body: prBody,
                  draft: true,
                  maintainer_can_modify: true
                });

                pullRequest = createdPullRequest.data;
                createdNow = true;
              } catch (error) {
                await postIssueComment([
                  '## Quality Map — Draft PR creation failed',
                  '',
                  'The approved analysis passed all gates, but GitHub could not create the implementation branch or draft PR.',
                  '',
                  `Error: \`${formatError(error)}\``,
                  '',
                  'Required fine-grained token permissions:',
                  '- Contents: Read and write',
                  '- Pull requests: Read and write',
                  '- Issues: Read and write'
                ].join('\n'));
                return;
              }
            } else if (!isRetry) {
              await postIssueComment([
                '## Quality Map — Implementation PR already exists',
                '',
                `The approved analysis already has an implementation pull request: ${pullRequest.html_url}`,
                '',
                'Use `/quality-map retry-implementation` only when Codex needs another implementation attempt in that existing PR.'
              ].join('\n'));
              return;
            }

            const attemptType = createdNow ? 'initial' : 'retry';
            const taskMarker = `<!-- quality-map-pr-implementation analysis-comment-id:${analysis.id} command-comment-id:${commandComment.id} attempt:${attemptType} -->`;

            const implementationRequest = [
              '@codex Implement the linked issue in this existing draft pull request using the human-approved Quality Map analysis below.',
              '',
              `Issue: ${issue.html_url}`,
              `Human approval: ${commandComment.html_url}`,
              `Approved analysis: ${analysis.html_url}`,
              `Approved map status: ${freshness}`,
              `Approved map coverage: ${mapCoverage}`,
              `Implementation attempt: ${attemptType}`,
              '',
              'Authorization state:',
              '- The linked human approval is the final authorization to implement.',
              '- State a short plan, then continue immediately without waiting for another approval.',
              '',
              'Delivery contract:',
              '- Work only in this existing pull request and its current branch.',
              '- Do not create another branch or another pull request.',
              '- Do not call `make_pr` and do not attempt `git push` from a workspace without a configured remote.',
              '- Apply the implementation changes to this pull request through the GitHub PR integration available in PR context.',
              '- Remove the bootstrap handoff file before completion:',
              `  - \`${handoffPath}\``,
              '- If this PR branch cannot be updated, comment here with `IMPLEMENTATION DELIVERY FAILED — PR BRANCH UPDATE UNAVAILABLE` and the exact limitation.',
              '',
              'Implementation requirements:',
              '- Read the issue body and the complete approved analysis embedded below.',
              '- Re-open and verify the current source and test files referenced by the analysis.',
              '- Implement only the approved behavior.',
              '- Add or update the service and API tests required by the analysis.',
              '- Preserve adjacent behavior and regression coverage identified by the analysis.',
              '- Do not perform unrelated refactoring or add unrelated features.',
              '- Run the validation commands required by `AGENTS.md` and the existing CI workflow.',
              '- Reply in this PR with files changed, tests added, validation results, and remaining risks.',
              '',
              '<details>',
              '<summary>Approved Quality Map analysis</summary>',
              '',
              analysisBody,
              '',
              '</details>',
              '',
              taskMarker
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullRequest.number,
              body: implementationRequest
            });

            const issueMarker = `<!-- quality-map-implementation-pr analysis-comment-id:${analysis.id} pr-number:${pullRequest.number} branch:${branchName} -->`;
            await postIssueComment([
              createdNow
                ? '## Quality Map — Draft implementation PR created'
                : '## Quality Map — Implementation retry sent to existing PR',
              '',
              `Pull request: ${pullRequest.html_url}`,
              `Branch: \`${branchName}\``,
              `Map status: ${freshness}`,
              `Map coverage: ${mapCoverage}`,
              '',
              createdNow
                ? 'Codex was requested inside the PR so it can update an existing GitHub branch rather than trying to publish a new PR from an Issue task.'
                : 'Codex was requested again inside the same PR; no duplicate PR was created.',
              '',
              issueMarker
            ].join('\n'));

            await github.rest.reactions.createForIssueComment({
              owner,
              repo,
              comment_id: commandComment.id,
              content: 'rocket'
            });

            core.info(`Codex ${attemptType} implementation requested in PR #${pullRequest.number}.`);
