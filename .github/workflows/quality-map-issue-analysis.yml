name: Quality Map Issue Analysis

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  request-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Validate command and request read-only Quality Map analysis
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.QUALITY_MAP_USER_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const issueNumber = issue?.number;
            const command = (comment?.body ?? '').trim();
            const author = (comment?.user?.login ?? '').toLowerCase();
            const isPullRequest = Boolean(issue?.pull_request);

            core.info(`Issue #${issueNumber}`);
            core.info(`Comment author: ${author}`);
            core.info(`Normalized command: ${JSON.stringify(command)}`);
            core.info(`Is pull request comment: ${isPullRequest}`);

            if (isPullRequest) {
              core.info('Ignoring comment because it belongs to a pull request.');
              return;
            }

            if (author !== 'mendi8345') {
              core.info('Ignoring comment because it was not written by the allowed user.');
              return;
            }

            if (command !== '/quality-map analyze') {
              core.info('Ignoring comment because it is not the Quality Map command.');
              return;
            }

            const body = [
              '@codex Perform a read-only Quality Map analysis for this issue.',
              '',
              'Before analyzing:',
              '- Read `.quality-map/active/map-manifest.json`.',
              '- Read `.quality-map/active/project-map.json`.',
              '- Read `.quality-map/active/evidence-index.json`.',
              '- Read `AGENTS.md`.',
              '- Use the active map only as a navigation aid. Verify task-relevant facts directly against the current source and tests.',
              '- Read the manifest source commit and determine the current repository HEAD.',
              '- If the commits differ, inspect the changed paths between the manifest source commit and HEAD.',
              '- Treat a commit mismatch only as a trigger for verification, not as a freshness verdict.',
              '- A changed task-relevant file does not by itself make the map stale.',
              '- Evaluate whether the mapped structural claims needed for this task remain correct: entry points, responsibilities, dependencies, flow relationships, and test locations.',
              '- Distinguish map freshness from map coverage. A flow that is absent from the map is a coverage gap, not automatically evidence that existing map claims are stale.',
              '',
              'Classify map freshness using exactly one of these values:',
              '- `FRESH`: the manifest source commit equals HEAD.',
              '- `FRESH FOR THIS TASK`: commits differ, but direct inspection confirms that all mapped structural claims needed for this task remain correct. Relevant files may have changed when those changes only affect implementation details inside the same mapped flow.',
              '- `POTENTIALLY STALE`: direct inspection found a plausible structural change to a mapped entry point, responsibility, dependency, flow relationship, or test location, but the impact could not yet be confirmed.',
              '- `MAP REFRESH REQUIRED`: current repository evidence contradicts a mapped structural claim, or a relevant structure or flow changed materially.',
              '- `UNVERIFIED`: the commit comparison, changed-path inspection, or direct verification could not be completed.',
              '',
              'Classify map coverage using exactly one of these values:',
              '- `COMPLETE`: the task flow is explicitly represented in the map.',
              '- `MAP COVERAGE GAP`: the task flow is not explicitly represented, or an important navigation area is missing. This does not by itself make the map stale or block implementation when current code was directly verified.',
              '',
              'Do not modify code, create commits, or create a pull request.',
              '',
              'Reply to this issue with exactly these sections:',
              '',
              '## Quality Map — Task Understanding',
              '- Restate the intended behavior and outcome.',
              '',
              '## Relevant Flow and Evidence',
              '- Identify the affected flow, likely entry points, source files, dependencies, and existing tests.',
              '- Cite repository paths for every factual claim.',
              '',
              '## Risks and Possible Impact',
              '- List regressions, adjacent flows, compatibility concerns, boundaries, and failure modes.',
              '',
              '## Required Test Coverage',
              '- List existing tests to preserve and new or changed tests likely required.',
              '',
              '## Facts, Assumptions, and Unknowns',
              '- Separate confirmed facts from assumptions and unresolved questions.',
              '',
              '## Confidence and Map Freshness',
              '- Give a confidence level with a short reason.',
              '- State the manifest source commit and current HEAD.',
              '- List task-relevant files changed between them, or explicitly state that none changed.',
              '- Explain whether any changed file altered a mapped structural claim or only implementation details.',
              '- Include these two machine-readable lines exactly as plain text, without bullets, bold, or extra punctuation:',
              'Map freshness: <FRESH | FRESH FOR THIS TASK | POTENTIALLY STALE | MAP REFRESH REQUIRED | UNVERIFIED>',
              'Map coverage: <COMPLETE | MAP COVERAGE GAP>',
              '- Explain the freshness and coverage decisions after those lines.',
              '',
              '## Recommendation',
              '- Return one of: READY FOR IMPLEMENTATION PLAN, NEEDS CLARIFICATION, or MAP REFRESH REQUIRED.',
              '- Use MAP REFRESH REQUIRED only when current evidence contradicts the map or relevant structure or flows changed materially, not merely because commits or mapped files differ.',
              '',
              'Wait for human approval. Do not implement the issue.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

            core.info('Quality Map analysis request comment created successfully.');
