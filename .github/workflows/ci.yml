name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Codex environment scripts
        shell: bash
        run: |
          set -euo pipefail

          bash -n scripts/codex-environment-setup.sh
          bash -n scripts/codex-environment-maintenance.sh

          setup_sha="$(sha256sum scripts/codex-environment-setup.sh | awk '{print $1}')"
          maintenance_sha="$(sha256sum scripts/codex-environment-maintenance.sh | awk '{print $1}')"

          test "$(grep -Foc "'${setup_sha}'" docs/codex-environment-delivery.md)" -eq 1
          test "$(grep -Foc "'${maintenance_sha}'" docs/codex-environment-delivery.md)" -eq 2

      - name: Validate Quality Map PR policy
        shell: bash
        run: |
          set -euo pipefail
          node --test scripts/quality-map-pr-policy.test.mjs
          ruby -e "require 'yaml'; ARGV.each { |f| YAML.load_file(f); puts \"valid YAML: #{f}\" }" .github/workflows/quality-map-pr-impact.yml .github/workflows/quality-map-pr-refresh.yml
          for file in .quality-map/active/map-manifest.json .quality-map/active/project-map.json .quality-map/active/evidence-index.json; do
            python3 -m json.tool "$file" >/dev/null
          done

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore AgenticQaLab.sln

      - name: Build
        run: dotnet build AgenticQaLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AgenticQaLab.sln --configuration Release --no-build --logger "console;verbosity=normal"
