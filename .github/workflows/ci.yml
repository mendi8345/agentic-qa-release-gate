name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore AgenticQaLab.sln

      - name: Build
        run: dotnet build AgenticQaLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AgenticQaLab.sln --configuration Release --no-build --logger "console;verbosity=normal"
